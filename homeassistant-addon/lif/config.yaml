name: "LiF Planner"
version: "1.1.4"
slug: "lif_planner"
description: "Local-first financial life planning for German households."
url: "https://github.com/lif-planner/lif"
image: "ghcr.io/lif-planner/lif"
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
stage: experimental
ingress: true
ingress_port: 8000
ingress_stream: true
watchdog: "http://[HOST]:[PORT:8000]/health/"
panel_icon: mdi:chart-line
panel_title: "LiF"
ports:
  8000/tcp: null
ports_description:
  8000/tcp: "Optional direct LiF web interface"
map:
  - type: backup
    read_only: false
backup: cold
options:
  demo_mode: true
  login_required: false
  allowed_hosts:
    - "*"
schema:
  demo_mode: bool
  login_required: bool
  allowed_hosts:
    - str
