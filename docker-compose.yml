services:
  lif:
    build:
      context: .
    image: lif-planner:local
    container_name: lif-planner
    restart: unless-stopped
    env_file:
      - ./docker/lif.env
    environment:
      DJANGO_DB_PATH: /data/db.sqlite3
      DJANGO_STATIC_ROOT: /data/staticfiles
      LIF_BACKUP_DIR: /data/backups
    ports:
      - "${LIF_HOST_PORT:-8001}:8000"
    volumes:
      - ./data:/data
