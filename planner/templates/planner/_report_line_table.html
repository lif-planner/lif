{% load i18n planner_extras %}
<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>{% trans "Section" %}</th>
                <th>{% trans "Name" %}</th>
                <th>{% trans "Amount" %}</th>
                <th>{% trans "Note" %}</th>
            </tr>
        </thead>
        <tbody>
            {% for line in lines %}
                <tr>
                    <td>{{ line.section }}</td>
                    <td>{{ line.name }}</td>
                    <td class="{% if line.amount < 0 %}negative{% endif %}">{{ line.amount|signed_money:currency }}</td>
                    <td>{{ line.note|default:"-" }}</td>
                </tr>
            {% empty %}
                <tr><td colspan="4">{{ empty }}</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
