{% if field.is_hidden %}
    {{ field }}
{% else %}
    <div class="form-field{% if field.errors %} has-error{% endif %}">
        {{ field.label_tag }}
        {{ field }}
        {% if field.help_text %}<small class="helptext">{{ field.help_text }}</small>{% endif %}
        {% for error in field.errors %}
            <small class="field-error">{{ error }}</small>
        {% endfor %}
    </div>
{% endif %}
