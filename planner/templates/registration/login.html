{% extends "planner/base.html" %}

{% block title %}Login | LiF Planner{% endblock %}

{% block content %}
<section class="hero">
    <div>
        <p class="eyebrow">Login</p>
        <h1>LiF Planner</h1>
        <p class="muted">Sign in to view local planning data.</p>
    </div>
</section>

<section>
    <form method="post" class="form-panel">
        {% csrf_token %}
        {{ form.as_div }}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="form-actions">
            <button class="button" type="submit">Login</button>
        </div>
    </form>
</section>
{% endblock %}
