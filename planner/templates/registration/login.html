{% extends "planner/base.html" %}
{% load i18n %}

{% block title %}{% trans "Login" %} | LiF Planner{% endblock %}

{% block content %}
<section class="hero">
    <div>
        <p class="eyebrow">{% trans "Login" %}</p>
        <h1>LiF Planner</h1>
        <p class="muted">{% trans "Sign in to view local planning data." %}</p>
    </div>
</section>

<section>
    <form method="post" class="form-panel">
        {% csrf_token %}
        {{ form.as_div }}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="form-actions">
            <button class="button" type="submit">{% trans "Login" %}</button>
        </div>
    </form>
</section>
{% endblock %}
