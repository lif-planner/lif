name: Container Image

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/lif

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: lif-smoke:${{ github.sha }}

      - name: Smoke test container
        run: scripts/smoke_container.sh lif-smoke:${{ github.sha }}

      - name: Read LiF version
        if: github.event_name == 'push'
        id: lif_version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          from pathlib import Path

          text = Path("lif/version.py").read_text()
          match = re.search(r'os\.environ\.get\("LIF_VERSION",\s*"([^"]+)"\)', text)
          if not match:
              raise SystemExit("Could not find default LIF_VERSION in lif/version.py")
          print(f"version={match.group(1)}")
          PY

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=${{ steps.lif_version.outputs.version }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and publish multi-arch image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
